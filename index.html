  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    
    @media print {
      /* Hide all UI elements that aren't the document */
      nav, header, aside, .no-print, button, select, footer {
        display: none !important;
        height: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Reset layout constraints for printer engine */
      html, body {
        height: auto !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        overflow: visible !important;
      }

      #root, main, .flex-1, div {
        display: block !important;
        height: auto !important;
        width: 100% !important;
        overflow: visible !important;
        position: static !important;
      }

      .print-container {
        display: block !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0.5in !important;
        background: white !important;
        border: none !important;
        box-shadow: none !important;
      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }
      
      .text-slate-900 { color: #000 !important; }
      .bg-slate-900 { background-color: #000 !important; color: #fff !important; }
    }
  </style>
